sonar.projectKey=M450-Starterprojekt-Frontend
sonar.projectName=M450-Starterprojekt-Frontend

# Only production frontend code is measured for coverage
sonar.sources=src
sonar.tests=src,tests
sonar.test.inclusions=src/**/*.test.js,src/**/*.test.jsx,tests/**/*.spec.js

# Use Jest coverage report
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Do not penalize bootstrap or test helper files in coverage
sonar.coverage.exclusions=src/main.jsx,src/setupTests.js,src/**/*.test.js,src/**/*.test.jsx
